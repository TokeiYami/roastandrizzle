<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roast & Drizzle POS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0b08;
    --surface: #181209;
    --card: #211a0d;
    --border: #3a2c14;
    --accent: #c8650a;
    --accent2: #e8830c;
    --gold: #d4a017;
    --gold-light: #f0c040;
    --text: #f0e6d0;
    --muted: #907050;
    --success: #4caf50;
    --danger: #e53935;
    --white: #fff8ef;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 24px rgba(200,101,10,0.12);
  }

  .brand { display: flex; align-items: center; gap: 12px; }

  .brand-logo {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }

  .brand-text .name {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 900;
    color: var(--gold-light);
    letter-spacing: 0.5px; line-height: 1.1;
  }

  .brand-text .sub {
    font-size: 9px; color: var(--muted);
    letter-spacing: 3px; text-transform: uppercase; margin-top: 1px;
  }

  .datetime { text-align: right; }
  .datetime .time {
    font-family: 'Playfair Display', serif;
    font-size: 18px; color: var(--text); line-height: 1;
  }
  .datetime .date { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  .app {
    display: grid;
    grid-template-columns: 1fr 350px;
    height: calc(100vh - 64px);
    overflow: hidden;
  }

  .menu-panel { padding: 22px; overflow-y: auto; }
  .menu-panel::-webkit-scrollbar { width: 4px; }
  .menu-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 16px;
  }

  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }

  .product-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 10px 35px rgba(200,101,10,0.2);
  }

  .product-card:active { transform: scale(0.97); }

  .product-img-wrap {
    width: 100%; height: 145px;
    background: var(--surface);
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  .product-img-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }

  .product-img-wrap .placeholder {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px; color: var(--muted);
  }

  .product-img-wrap .placeholder .icon { font-size: 38px; opacity: 0.45; }
  .product-img-wrap .placeholder .lbl { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }

  .img-upload-btn {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff; border-radius: 8px;
    padding: 5px 9px; font-size: 11px; font-weight: 600;
    cursor: pointer; backdrop-filter: blur(4px);
    transition: background 0.15s;
    display: flex; align-items: center; gap: 4px; z-index: 2;
  }

  .img-upload-btn:hover { background: rgba(200,101,10,0.85); }

  .product-info { padding: 14px 16px 16px; }

  .product-name {
    font-family: 'Playfair Display', serif;
    font-size: 15px; font-weight: 700;
    color: var(--white); margin-bottom: 8px; line-height: 1.3;
  }

  .product-bottom { display: flex; align-items: center; justify-content: space-between; }

  .product-price {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 900; color: var(--gold); line-height: 1;
  }

  .product-price small {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 2px;
  }

  .add-btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: 9px; padding: 7px 14px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 12px;
    cursor: pointer; transition: background 0.15s;
  }

  .add-btn:hover { background: var(--accent2); }

  .order-panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  .order-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }

  .order-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 700; color: var(--white);
  }

  .order-badge {
    background: var(--accent); color: #fff;
    border-radius: 20px; padding: 3px 11px;
    font-size: 11px; font-weight: 600;
  }

  .order-items { flex: 1; overflow-y: auto; padding: 10px 20px; }
  .order-items::-webkit-scrollbar { width: 3px; }
  .order-items::-webkit-scrollbar-thumb { background: var(--border); }

  .empty-order {
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); gap: 10px;
  }

  .empty-order .empty-icon { font-size: 44px; opacity: 0.35; }
  .empty-order p { font-size: 12px; text-align: center; line-height: 1.7; }

  .order-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    animation: fadeSlide 0.2s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .order-item-thumb {
    width: 44px; height: 44px; border-radius: 10px;
    overflow: hidden; background: var(--card); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }

  .order-item-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .order-item-info { flex: 1; min-width: 0; }

  .order-item-name {
    font-size: 13px; font-weight: 600; color: var(--white);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
  }

  .order-item-sub { font-size: 11px; color: var(--gold); }

  .qty-controls { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

  .qty-btn {
    width: 28px; height: 28px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.12s; line-height: 1;
  }

  .qty-btn:hover { border-color: var(--accent); color: var(--accent); }
  .qty-btn.del:hover { border-color: var(--danger); color: var(--danger); }

  .qty-num {
    font-family: 'Playfair Display', serif;
    font-size: 17px; min-width: 20px; text-align: center;
    color: var(--white); font-weight: 700;
  }

  .order-footer {
    padding: 14px 20px 18px;
    border-top: 1px solid var(--border);
    background: var(--card);
  }

  .line-items { margin-bottom: 8px; }

  .line-item {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin-bottom: 3px;
  }

  .total-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .total-lbl {
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 700; color: var(--muted); letter-spacing: 1px;
  }

  .total-val {
    font-family: 'Playfair Display', serif;
    font-size: 34px; font-weight: 900; color: var(--gold-light); line-height: 1;
  }

  .total-val .sym { font-size: 20px; }

  .cash-lbl {
    font-size: 10px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }

  .cash-input {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--white);
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700;
    padding: 8px 12px; outline: none;
    transition: border 0.15s; margin-bottom: 6px;
  }

  .cash-input:focus { border-color: var(--accent); }

  .quick-cash { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }

  .qc {
    flex: 1; min-width: 48px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted);
    font-size: 11px; font-weight: 600;
    padding: 6px 4px; cursor: pointer; transition: all 0.12s; text-align: center;
  }

  .qc:hover { border-color: var(--gold); color: var(--gold); }

  .change-box {
    display: flex; justify-content: space-between; align-items: center;
    border-radius: 10px; padding: 8px 12px; margin-bottom: 10px; border: 1px solid;
  }

  .change-box.ok { background: rgba(76,175,80,0.1); border-color: rgba(76,175,80,0.35); }
  .change-box.err { background: rgba(229,57,53,0.1); border-color: rgba(229,57,53,0.35); }
  .change-box .clbl { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .change-box.ok .clbl { color: var(--success); }
  .change-box.err .clbl { color: var(--danger); }
  .change-box .cval { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; }
  .change-box.ok .cval { color: var(--success); }
  .change-box.err .cval { color: var(--danger); }

  .charge-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 13px; padding: 14px;
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 18px rgba(200,101,10,0.35);
  }

  .charge-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(200,101,10,0.45);
  }

  .charge-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

  .clear-btn {
    width: 100%; background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 11px;
    padding: 8px; font-size: 12px; font-weight: 500;
    cursor: pointer; margin-top: 7px; transition: all 0.12s;
  }

  .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* RECEIPT */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 200;
    align-items: center; justify-content: center; padding: 20px;
  }

  .overlay.show { display: flex; }

  .receipt {
    background: #fdfaf5; color: #1a1208;
    border-radius: 18px; padding: 28px 22px;
    max-width: 310px; width: 100%;
    font-family: 'DM Sans', sans-serif;
    animation: pop 0.25s ease;
    max-height: 90vh; overflow-y: auto;
  }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.88); }
    to { opacity: 1; transform: scale(1); }
  }

  .r-head {
    text-align: center;
    padding-bottom: 14px; margin-bottom: 14px;
    border-bottom: 2px dashed #d0c0a0;
  }

  .r-brand {
    font-family: 'Playfair Display', serif;
    font-size: 26px; font-weight: 900; color: var(--accent); line-height: 1;
  }

  .r-sub { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #a08060; margin-top: 3px; }
  .r-meta { font-size: 10px; color: #908070; margin-top: 8px; line-height: 1.5; }

  .r-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; color: #333; }
  .r-row .rp { font-weight: 600; color: #111; }

  .r-div { border: none; border-top: 1px dashed #d0c0a0; margin: 10px 0; }

  .r-total {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 900;
    padding-top: 8px; margin-bottom: 8px; color: #111;
  }

  .r-cash { display: flex; justify-content: space-between; font-size: 13px; color: #555; padding: 3px 0; }

  .r-change {
    display: flex; justify-content: space-between;
    background: #f0fdf4; border: 1px solid #bbf7d0;
    border-radius: 8px; padding: 7px 10px; margin-top: 6px;
    color: #166534; font-weight: 600; font-size: 13px;
  }

  .r-foot {
    text-align: center; padding-top: 12px; margin-top: 12px;
    border-top: 1px dashed #d0c0a0;
    font-size: 11px; color: #aaa; letter-spacing: 1px; line-height: 1.8;
  }

  .r-actions { display: flex; gap: 8px; margin-top: 16px; }
  .r-actions button {
    flex: 1; padding: 11px; border-radius: 10px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  .r-actions button:hover { opacity: 0.85; }
  .btn-print { background: var(--accent); color: white; }
  .btn-new { background: #1a1208; color: white; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--card); border: 1px solid var(--accent);
    color: var(--text); padding: 10px 22px;
    border-radius: 30px; font-size: 13px; font-weight: 500;
    z-index: 300; transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap; pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 700px) {
    .app { display: flex; flex-direction: column; height: auto; overflow: visible; }
    .menu-panel { overflow: visible; padding: 16px; }
    .order-panel { border-left: none; border-top: 2px solid var(--accent); }
    .order-items { max-height: 260px; }
    .products-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .product-img-wrap { height: 115px; }
    .brand-text .name { font-size: 16px; }
  }

  @media (max-width: 420px) {
    .products-grid { grid-template-columns: 1fr; }
  }

  @media print {
    body * { visibility: hidden; }
    .receipt, .receipt * { visibility: visible; }
    .receipt { position: fixed; left: 50%; top: 0; transform: translateX(-50%); }
    .r-actions { display: none; }
    .overlay { display: flex !important; background: white; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">🔥</div>
    <div class="brand-text">
      <div class="name">Roast &amp; Drizzle</div>
      <div class="sub">Point of Sale</div>
    </div>
  </div>
  <div class="datetime">
    <div class="time" id="clock">--:--</div>
    <div class="date" id="datestr">---</div>
  </div>
</header>

<div class="app">
  <div class="menu-panel">
    <div class="section-label">Menu Items</div>
    <div class="products-grid" id="productGrid"></div>
  </div>

  <div class="order-panel">
    <div class="order-header">
      <div class="order-title">Current Order</div>
      <div class="order-badge" id="orderBadge">0 items</div>
    </div>
    <div class="order-items" id="orderItems">
      <div class="empty-order">
        <div class="empty-icon">🛒</div>
        <p>No items added yet.<br>Tap a product to start.</p>
      </div>
    </div>
    <div class="order-footer">
      <div class="line-items" id="lineItems"></div>
      <div class="total-bar">
        <div class="total-lbl">TOTAL</div>
        <div class="total-val"><span class="sym">₱</span><span id="totalAmt">0</span></div>
      </div>
      <div class="cash-lbl">Cash Tendered</div>
      <input class="cash-input" type="number" id="cashInput" placeholder="0" min="0">
      <div class="quick-cash">
        <button class="qc" onclick="setCash(50)">₱50</button>
        <button class="qc" onclick="setCash(100)">₱100</button>
        <button class="qc" onclick="setCash(200)">₱200</button>
        <button class="qc" onclick="setCash(500)">₱500</button>
        <button class="qc" onclick="setCash('exact')">Exact</button>
      </div>
      <div id="changeBox" style="display:none"></div>
      <button class="charge-btn" id="chargeBtn" onclick="processOrder()" disabled>Charge Order</button>
      <button class="clear-btn" onclick="clearOrder()">Clear Order</button>
    </div>
  </div>
</div>

<div class="overlay" id="receiptModal">
  <div class="receipt">
    <div class="r-head">
      <div class="r-brand">🔥 Roast &amp; Drizzle</div>
      <div class="r-sub">Food Stall</div>
      <div class="r-meta" id="rMeta"></div>
    </div>
    <div id="rItems"></div>
    <hr class="r-div">
    <div id="rTotals"></div>
    <div class="r-foot">SALAMAT PO! 🙏<br>Come back soon!</div>
    <div class="r-actions">
      <button class="btn-print" onclick="window.print()">🖨 Print</button>
      <button class="btn-new" onclick="newOrder()">+ New Order</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>


<script>
const PRODUCTS = [
  { id: 1, name: "Pork Kasim Combo", price: 120, emoji: "🍖", image: "images/PORKKASIM.PNG" },
  { id: 2, name: "Pork Belly Combo", price: 120, emoji: "🥩", image: "images/PORKBELLY.PNG" },
];

let order = [];
let orderNo = 1;

// Clock
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('datestr').textContent =
    n.toLocaleDateString('en-PH', { weekday: 'short', month: 'short', day: 'numeric' });
}
tick(); setInterval(tick, 1000);

// Render products
function renderProducts() {
  document.getElementById('productGrid').innerHTML = PRODUCTS.map(p => `
    <div class="product-card" onclick="addItem(${p.id})">
      <div class="product-img-wrap">
        <img src="${p.image}" alt="${p.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="placeholder" style="display:none">
          <span class="icon">${p.emoji}</span>
          <span class="lbl">No image</span>
        </div>
      </div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-bottom">
          <div class="product-price">&#8369;${p.price}<small>/order</small></div>
          <button class="add-btn" onclick="event.stopPropagation(); addItem(${p.id})">+ Add</button>
        </div>
      </div>
    </div>
  `).join('');
}

// Order
function addItem(id) {
  const p = PRODUCTS.find(x => x.id === id);
  const ex = order.find(x => x.id === id);
  if (ex) ex.qty++; else order.push({ ...p, qty: 1 });
  renderOrder();
  showToast(`${p.emoji} Added ${p.name}`);
}

function changeQty(id, d) {
  const item = order.find(x => x.id === id);
  if (!item) return;
  item.qty += d;
  if (item.qty <= 0) order = order.filter(x => x.id !== id);
  renderOrder();
}

function clearOrder() {
  order = [];
  document.getElementById('cashInput').value = '';
  renderOrder();
}

function getTotal() { return order.reduce((s, i) => s + i.price * i.qty, 0); }

function renderOrder() {
  const total = getTotal();
  const count = order.reduce((s, i) => s + i.qty, 0);
  document.getElementById('totalAmt').textContent = total.toLocaleString();
  document.getElementById('orderBadge').textContent = `${count} item${count !== 1 ? 's' : ''}`;

  const container = document.getElementById('orderItems');
  if (!order.length) {
    container.innerHTML = `<div class="empty-order"><div class="empty-icon">🛒</div><p>No items added yet.<br>Tap a product to start.</p></div>`;
  } else {
    container.innerHTML = order.map(item => `
        <div class="order-item">
          <div class="order-item-thumb">
            <img src="${item.image}" alt="" onerror="this.style.display='none';this.parentElement.innerHTML='${item.emoji}'">
          </div>
          <div class="order-item-info">
            <div class="order-item-name">${item.name}</div>
            <div class="order-item-sub">₱${(item.price * item.qty).toLocaleString()} · ${item.qty} × ₱${item.price}</div>
          </div>
          <div class="qty-controls">
            <button class="qty-btn del" onclick="changeQty(${item.id}, -1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          </div>
        </div>
      `).join('');
  }

  document.getElementById('lineItems').innerHTML = order.length > 1
    ? order.map(i => `<div class="line-item"><span>${i.name} ×${i.qty}</span><span>₱${(i.price*i.qty).toLocaleString()}</span></div>`).join('')
    : '';

  updateChange();
}

function setCash(v) {
  document.getElementById('cashInput').value = v === 'exact' ? getTotal() : v;
  updateChange();
}

document.getElementById('cashInput').addEventListener('input', updateChange);

function updateChange() {
  const total = getTotal();
  const cash = parseFloat(document.getElementById('cashInput').value) || 0;
  const box = document.getElementById('changeBox');
  const btn = document.getElementById('chargeBtn');

  if (!order.length || total === 0) { box.style.display = 'none'; btn.disabled = true; return; }

  btn.disabled = false;

  if (cash > 0) {
    const diff = cash - total;
    box.style.display = 'flex';
    box.className = `change-box ${diff >= 0 ? 'ok' : 'err'}`;
    box.innerHTML = `<span class="clbl">${diff >= 0 ? 'Change' : 'Short by'}</span><span class="cval">₱${Math.abs(diff).toLocaleString()}</span>`;
    if (diff < 0) btn.disabled = true;
  } else {
    box.style.display = 'none';
  }
}

function processOrder() {
  if (!order.length) return;
  const total = getTotal();
  const cash = parseFloat(document.getElementById('cashInput').value) || 0;
  const change = cash - total;
  const now = new Date();

  document.getElementById('rMeta').innerHTML =
    `Order #${String(orderNo).padStart(4,'0')}<br>${now.toLocaleString('en-PH', { dateStyle: 'medium', timeStyle: 'short' })}`;

  document.getElementById('rItems').innerHTML = order.map(i => `
    <div class="r-row"><span>${i.emoji} ${i.name} ×${i.qty}</span><span class="rp">₱${(i.price*i.qty).toLocaleString()}</span></div>
  `).join('');

  document.getElementById('rTotals').innerHTML = `
    <div class="r-total"><span>TOTAL</span><span>₱${total.toLocaleString()}</span></div>
    ${cash > 0 ? `<div class="r-cash"><span>Cash</span><span>₱${cash.toLocaleString()}</span></div><div class="r-change"><span>Change</span><span>₱${Math.max(0,change).toLocaleString()}</span></div>` : ''}
  `;

  document.getElementById('receiptModal').classList.add('show');
  orderNo++;
}

function newOrder() {
  document.getElementById('receiptModal').classList.remove('show');
  clearOrder();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

renderProducts();
renderOrder();
</script>
</body>
</html>
